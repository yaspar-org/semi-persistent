name: Setup Verus
description: Install a pinned version of the Verus verifier
inputs:
  version:
    description: 'Verus version (e.g. 0.2026.03.28.3390e9a)'
    required: true
runs:
  using: composite
  steps:
    - name: Cache Verus
      id: cache
      uses: actions/cache@v5
      with:
        path: ~/.verus
        key: verus-${{ runner.os }}-${{ runner.arch }}-${{ inputs.version }}

    - name: Download Verus
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p ~/.verus
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)    ASSET="verus-${{ inputs.version }}-x86-linux.zip" ;;
          macOS-ARM64)  ASSET="verus-${{ inputs.version }}-arm64-macos.zip" ;;
          macOS-X64)    ASSET="verus-${{ inputs.version }}-x86-macos.zip" ;;
          Windows-X64)  ASSET="verus-${{ inputs.version }}-x86-win.zip" ;;
          *) echo "Unsupported platform: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
        esac
        curl -fL -o /tmp/verus.zip \
          "https://github.com/verus-lang/verus/releases/download/release%2F${{ inputs.version }}/$ASSET"
        unzip /tmp/verus.zip -d ~/.verus
        rm /tmp/verus.zip

    - name: Add to PATH
      shell: bash
      run: |
        DIR=$(find ~/.verus -maxdepth 1 -type d -name 'verus-*' | head -1)
        echo "$DIR" >> $GITHUB_PATH
