name: Setup Rust
description: Install Rust toolchain using the channel pinned in rust-toolchain.toml
inputs:
  components:
    description: Comma-separated list of additional components (e.g. "clippy,rustfmt")
    required: false
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        CHANNEL=$(grep '^channel' rust-toolchain.toml | cut -d '"' -f 2)
        rustup toolchain install "$CHANNEL" --profile minimal --no-self-update
        rustup default "$CHANNEL"
        if [ -n "$COMPONENTS" ]; then
          rustup component add --toolchain "$CHANNEL" ${COMPONENTS//,/ }
        fi
      env:
        COMPONENTS: ${{ inputs.components }}
